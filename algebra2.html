	<style>
		:root{--sidebar-width:250px}
		body{margin:0;font-family:Arial,Helvetica,sans-serif}
		.page{
			padding:16px;
			box-sizing:border-box;
		}
		/* Top row of chapter boxes */
		.chapter-row{
			display:flex;
			gap:12px;
			align-items:stretch;
			justify-content:space-between;
			width:100%;
			box-sizing:border-box;
			margin-bottom:20px;
		}
		.chapter{
			flex:1 1 0;
			min-width:0;
			background:#4CAF50;
			color:#fff;
			padding:12px 8px;
			text-align:center;
			border-radius:6px;
			font-weight:700;
			box-sizing:border-box;
			display:flex;
			flex-direction:column; /* stack title + button */
			align-items:center;
			justify-content:flex-start; /* keep title at the top */
			padding-top:12px;
			gap:10px; /* space title and buttons evenly */
		}

		.chapter-title{
			width:100%;
			text-align:center;
			display:block;
			font-weight:700;
		}
		/* make row wrap on small screens and keep boxes visually even */
		@media (max-width:720px){
			.chapter-row{flex-wrap:wrap}
			.chapter{flex:0 0 48%;margin-bottom:12px}
		}
		@media (max-width:420px){
			.chapter{flex:0 0 100%}
		}

		/* button style for section buttons */
		.section-btn{
			display:block;
			width:100%;
			margin:6px 0;
			padding:8px 12px;
			border-radius:6px;
			border:none;
			background:#1976d2;
			color:#fff;
			cursor:pointer;
			font-weight:600;
		}

		/* make any section button fill its chapter width */
		.chapter .section-btn{
			width:100%;
			box-sizing:border-box;
			margin-top:8px;
			padding:10px 12px;
		}

		/* stack title + button for the first chapter box and make button full width */
		.chapter:first-child{flex-direction:column}
		.chapter .section-btn{width:100%;margin-top:8px;padding:10px;border-radius:6px}
	</style>
